name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply (patch, minor, major)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.version.outputs.next }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test gate
        run: bun run test

      - name: Compute next version
        id: version
        uses: actions/github-script@v8
        env:
          BUMP: ${{ inputs.bump }}
        with:
          script: |
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const current = pkg.version;
            const bump = process.env.BUMP || "patch";

            const parts = current.split(".").map(Number);
            let [major, minor, patch] = parts;

            if (bump === "major") [major, minor, patch] = [major + 1, 0, 0];
            else if (bump === "minor") [minor, patch] = [minor + 1, 0];
            else patch++;

            const next = `${major}.${minor}.${patch}`;
            const tag = `v${next}`;

            core.setOutput("next", next);
            core.setOutput("tag", tag);

            core.startGroup("Version Computation Results");
            core.info(`Current version: v${current}`);
            core.info(`Bump type:       ${bump}`);
            core.info(`Next version:    v${next}`);
            core.info(`Release tag:     ${tag}`);
            core.endGroup();

      - name: Bump package version and installer pin
        uses: actions/github-script@v8
        env:
          NEW_VERSION: ${{ steps.version.outputs.next }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            core.startGroup("Bumping Files");

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = process.env.NEW_VERSION;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
            core.info(`Updated package.json version to ${process.env.NEW_VERSION}`);

            const installPath = path.join("skills", "consensus", "scripts", "install.sh");
            const install = fs.readFileSync(installPath, "utf8");
            fs.writeFileSync(installPath, install.replace(/CLI_VERSION="v[^"]*"/, `CLI_VERSION="v${process.env.NEW_VERSION}"`));
            core.info(`Updated skills/consensus/scripts/install.sh CLI_VERSION pin to v${process.env.NEW_VERSION}`);

            core.endGroup();

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json skills/consensus/scripts/install.sh
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push origin main

  changelog:
    needs: prepare
    uses: ./.github/workflows/changelog.yml
    with:
      version: ${{ needs.prepare.outputs.next }}
    secrets: inherit

  tag:
    needs: [prepare, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"
