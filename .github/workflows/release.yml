name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun run build:binary

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/consensus-*
          if-no-files-found: error

  checksums:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: (cd dist && shasum -a 256 consensus-*) > dist/checksums.sha256

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: dist/checksums.sha256
          if-no-files-found: error

  release:
    needs: [build, checksums]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.checksums.result == 'success' || needs.checksums.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: checksums
          merge-multiple: true
          path: dist

      - name: Download binaries
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Determine pre-release
        id: meta
        run: |
          if echo "${{ inputs.tag }}" | grep -qE '(beta|rc|[0-9]{8})'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          draft: true
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.meta.outputs.prerelease != 'true' }}
          files: |
            dist/consensus-*
            dist/checksums.sha256
