name: Release Orchestrator

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test gate
        run: bun test tests/*.test.ts --isolate

  draft-release:
    name: Draft Release
    needs: [test-gate]
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ github.ref_name }}
